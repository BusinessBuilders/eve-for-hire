<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" width="720" height="720" role="img" aria-label="Eve, an AI agent: a glowing teal and indigo orb with a voice waveform, connected to capability nodes for voice, websites, invoices, and scheduling">
  <style>
    @keyframes eve-listen { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes eve-halo { 0%,100% { opacity: .35; } 50% { opacity: .7; } }
    @keyframes eve-wave-a { 0%,100% { transform: scaleY(.62); } 50% { transform: scaleY(.95); } }
    @keyframes eve-wave-b { 0%,100% { transform: scaleY(.85); } 50% { transform: scaleY(.55); } }
    @keyframes eve-wave-c { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(.7); } }
    .orb-breathe { animation: eve-listen 3.6s cubic-bezier(.2,.8,.2,1) infinite; transform-origin: 360px 360px; }
    .halo { animation: eve-halo 3.6s cubic-bezier(.2,.8,.2,1) infinite; }
    .wave-bar { transform-box: fill-box; transform-origin: center; }
    .w1 { animation: eve-wave-a 1.9s ease-in-out infinite; }
    .w2 { animation: eve-wave-b 1.6s ease-in-out .2s infinite; }
    .w3 { animation: eve-wave-c 1.4s ease-in-out .1s infinite; }
    .w4 { animation: eve-wave-b 1.7s ease-in-out .3s infinite; }
    .w5 { animation: eve-wave-a 2s ease-in-out .15s infinite; }
    @media (prefers-reduced-motion: reduce) {
      .orb-breathe, .halo, .w1, .w2, .w3, .w4, .w5 { animation: none; }
    }
  </style>
  <defs>
    <radialGradient id="orbCore" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="38%" stop-color="#2DD4BF"/>
      <stop offset="78%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46B8"/>
    </radialGradient>
    <radialGradient id="orbField" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity=".28"/>
      <stop offset="55%" stop-color="#6366F1" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spokeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity=".08"/>
    </linearGradient>
    <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#02060A" flood-opacity=".55"/>
    </filter>
  </defs>

  <!-- ── Ambient field ─────────────────────────────────────────────── -->
  <circle cx="360" cy="360" r="330" fill="url(#orbField)" class="halo"/>
  <circle cx="360" cy="360" r="252" fill="none" stroke="#24303C" stroke-width="1" stroke-dasharray="2 7" opacity=".9"/>

  <!-- ── Spoke connectors (orb → nodes) ────────────────────────────── -->
  <g stroke-width="1.5" fill="none">
    <path d="M 462 258 L 540 180" stroke="url(#spokeLine)"/>
    <path d="M 468 460 L 548 536" stroke="url(#spokeLine)"/>
    <path d="M 252 462 L 174 538" stroke="url(#spokeLine)"/>
    <path d="M 256 260 L 178 182" stroke="url(#spokeLine)"/>
  </g>

  <!-- ── The listening orb ─────────────────────────────────────────── -->
  <g class="orb-breathe">
    <circle cx="360" cy="360" r="150" fill="url(#orbCore)" filter="url(#lift)"/>
    <circle cx="360" cy="360" r="150" fill="none" stroke="#5EEAD4" stroke-opacity=".5" stroke-width="1.5"/>
    <circle cx="360" cy="360" r="168" fill="none" stroke="#2DD4BF" stroke-opacity=".22" stroke-width="1"/>
    <!-- specular highlight -->
    <ellipse cx="316" cy="300" rx="64" ry="40" fill="#FFFFFF" opacity=".14"/>
    <!-- 5-bar waveform: heights 0.6 / 0.8 / 1 / 0.8 / 0.6 of 88px -->
    <g fill="#04201C" opacity=".85">
      <rect class="wave-bar w1" x="312" y="333.6" width="14" height="52.8" rx="7"/>
      <rect class="wave-bar w2" x="334" y="324.8" width="14" height="70.4" rx="7"/>
      <rect class="wave-bar w3" x="356" y="316"   width="14" height="88"   rx="7"/>
      <rect class="wave-bar w4" x="378" y="324.8" width="14" height="70.4" rx="7"/>
      <rect class="wave-bar w5" x="400" y="333.6" width="14" height="52.8" rx="7"/>
    </g>
  </g>

  <!-- ── Capability node: voice (top-right) ────────────────────────── -->
  <g filter="url(#lift)">
    <rect x="540" y="122" width="116" height="116" rx="18" fill="#11161D" stroke="#24303C"/>
    <g stroke="#2DD4BF" stroke-width="6" stroke-linecap="round">
      <line x1="566" y1="172" x2="566" y2="188"/>
      <line x1="584" y1="162" x2="584" y2="198"/>
      <line x1="602" y1="152" x2="602" y2="208"/>
      <line x1="620" y1="164" x2="620" y2="196"/>
      <line x1="636" y1="172" x2="636" y2="188"/>
    </g>
  </g>

  <!-- ── Capability node: website (bottom-right) ───────────────────── -->
  <g filter="url(#lift)">
    <rect x="548" y="478" width="116" height="116" rx="18" fill="#11161D" stroke="#24303C"/>
    <rect x="570" y="502" width="72" height="66" rx="8" fill="none" stroke="#6366F1" stroke-width="3"/>
    <line x1="570" y1="518" x2="642" y2="518" stroke="#6366F1" stroke-width="3"/>
    <circle cx="578" cy="510" r="2.6" fill="#2DD4BF"/>
    <circle cx="587" cy="510" r="2.6" fill="#2DD4BF"/>
    <rect x="578" y="528" width="34" height="6" rx="3" fill="#2DD4BF"/>
    <rect x="578" y="541" width="56" height="5" rx="2.5" fill="#24303C"/>
    <rect x="578" y="552" width="46" height="5" rx="2.5" fill="#24303C"/>
  </g>

  <!-- ── Capability node: invoice (bottom-left) ────────────────────── -->
  <g filter="url(#lift)">
    <rect x="56" y="480" width="116" height="116" rx="18" fill="#11161D" stroke="#24303C"/>
    <path d="M 88 504 h 40 l 16 16 v 56 a 6 6 0 0 1 -6 6 h -50 a 6 6 0 0 1 -6 -6 v -66 a 6 6 0 0 1 6 -6 z" fill="none" stroke="#2DD4BF" stroke-width="3"/>
    <path d="M 128 504 v 16 h 16" fill="none" stroke="#2DD4BF" stroke-width="3"/>
    <line x1="92" y1="536" x2="120" y2="536" stroke="#24303C" stroke-width="4" stroke-linecap="round"/>
    <line x1="92" y1="548" x2="128" y2="548" stroke="#24303C" stroke-width="4" stroke-linecap="round"/>
    <line x1="92" y1="560" x2="112" y2="560" stroke="#24303C" stroke-width="4" stroke-linecap="round"/>
    <line x1="118" y1="560" x2="134" y2="560" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- ── Capability node: calendar (top-left) ──────────────────────── -->
  <g filter="url(#lift)">
    <rect x="62" y="124" width="116" height="116" rx="18" fill="#11161D" stroke="#24303C"/>
    <rect x="84" y="150" width="72" height="64" rx="8" fill="none" stroke="#6366F1" stroke-width="3"/>
    <line x1="84" y1="168" x2="156" y2="168" stroke="#6366F1" stroke-width="3"/>
    <line x1="102" y1="144" x2="102" y2="156" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <line x1="138" y1="144" x2="138" y2="156" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <rect x="94" y="178" width="12" height="10" rx="2" fill="#24303C"/>
    <rect x="114" y="178" width="12" height="10" rx="2" fill="#2DD4BF"/>
    <rect x="134" y="178" width="12" height="10" rx="2" fill="#24303C"/>
    <rect x="94" y="194" width="12" height="10" rx="2" fill="#24303C"/>
    <rect x="114" y="194" width="12" height="10" rx="2" fill="#24303C"/>
  </g>
</svg>
