name: Deploy to Contabo VPS

# Deploys every push to main → Contabo VPS at 167.86.70.138
# Pulls latest code, rebuilds Next.js, reloads PM2.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   VPS_SSH_KEY  — private key with access to root@167.86.70.138
#                  Supports PEM, OpenSSH, and base64-encoded formats.
#                  If still failing, regenerate with:
#                    ssh-keygen -t ed25519 -C "github-actions" -f /tmp/vps_deploy
#                  Then: add /tmp/vps_deploy.pub to VPS ~/.ssh/authorized_keys
#                  And:  store /tmp/vps_deploy contents in the VPS_SSH_KEY secret

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH pull + rebuild + PM2 reload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: ssh-keyscan -H 167.86.70.138 >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -o ConnectTimeout=30 \
            root@167.86.70.138 << 'ENDSSH'
            set -e
            cd /var/www/eve-for-hire-app
            git pull origin main
            npm ci
            mkdir -p data
            # Prisma migrate needs DATABASE_URL — extract just that var from .env.production
            # (don't source the whole file — it may contain SSH keys with special chars)
            export DATABASE_URL="$(grep '^DATABASE_URL=' .env.production 2>/dev/null | head -1 | cut -d= -f2- | tr -d \"\' || echo 'file:./data/eve-auth.db')"
            npx prisma migrate deploy
            NODE_ENV=production npm run build
            pm2 reload ecosystem.config.js --env production
            pm2 save

            # Reload nginx proxy config if the eve-landing container is running.
            # Also pull latest nginx config in /var/www/eve-for-hire (legacy path)
            # so proxy_read_timeout and other changes take effect immediately.
            if docker inspect eve-landing >/dev/null 2>&1; then
              if [ -d /var/www/eve-for-hire ]; then
                cd /var/www/eve-for-hire && git pull origin main || true
              fi
              docker exec eve-landing nginx -s reload
              echo "nginx reloaded."
            else
              echo "WARNING: eve-landing container not found — nginx not reloaded."
            fi

            echo "Deploy complete."
          ENDSSH
