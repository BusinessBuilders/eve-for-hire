name: Deploy to Contabo VPS

# Deploys every push to main → Contabo VPS at 167.86.70.138
# Pulls latest code, rebuilds Next.js, reloads PM2.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   VPS_SSH_KEY  — PEM private key with access to root@167.86.70.138
#                  (paste the full key including BEGIN/END lines)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH pull + rebuild + PM2 reload
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@167.86.70.138 << 'ENDSSH'
            set -e
            cd /var/www/eve-for-hire-app
            git pull origin main
            npm ci
            NODE_ENV=production npm run build
            pm2 reload ecosystem.config.js --env production
            pm2 save
            echo "Deploy complete."
          ENDSSH
          rm -f /tmp/vps_key
